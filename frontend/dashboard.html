<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halleyx Dashboard · Supabase</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- jQuery (required for DataTables) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- DataTables CSS & JS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #818cf8;
            --primary-dark: #3730a3;
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
            --body-bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --border-color: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --muted: #6b7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--body-bg);
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            flex-shrink: 0;
            height: 72px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            border-bottom: 1px solid var(--border-color);
            z-index: 30;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-toggle {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: var(--text-secondary);
            cursor: pointer;
            display: none;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .menu-toggle:hover {
            background: var(--body-bg);
            color: var(--primary);
        }

        /* Logo icon - consistent with login page */
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 8px 16px -4px rgba(79, 70, 229, 0.4);
        }

        /* Override margin for navbar context */
        .navbar-left .logo-icon {
            margin-bottom: 0;
        }

        .app-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-name {
            font-weight: 800;
            font-size: 1.35rem;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .navbar-center {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--body-bg);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        
        .navbar-center:focus-within {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .navbar-center label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .date-dropdown {
            border: none;
            background: transparent;
            font-weight: 600;
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px 6px 6px;
            border-radius: 12px;
            transition: background 0.2s;
            cursor: pointer;
        }
        
        .user-info:hover {
            background: var(--body-bg);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .logout-btn {
            background: white;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .logout-btn:hover {
            background: #fef2f2;
            border-color: #fecaca;
            color: var(--danger);
        }

        /* ===== MAIN CONTAINER ===== */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            transition: width 0.25s ease;
            overflow-y: auto;
            overflow-x: hidden;
            border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 20;
        }

        .sidebar-nav {
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--text-tertiary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.15s;
            white-space: nowrap;
            position: relative;
        }
        
        .menu-item i {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
            transition: transform 0.2s;
        }
        
        .menu-item span { 
            font-size: 0.95rem; 
            letter-spacing: -0.2px;
        }
        
        .menu-item:hover { 
            background: var(--sidebar-hover); 
            color: #ffffff; 
        }
        
        .menu-item:hover i { 
            transform: scale(1.1); 
            color: var(--primary-light); 
        }
        
        .menu-item.active {
            background: linear-gradient(90deg, rgba(79, 70, 229, 0.2) 0%, rgba(79, 70, 229, 0.05) 100%);
            color: white;
            box-shadow: inset 3px 0 0 var(--primary);
        }
        
        .menu-item.active i { 
            color: var(--primary-light); 
        }

        /* ===== MAIN CONTENT ===== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 32px 40px;
            background-color: var(--body-bg);
        }

        .welcome-card {
            background: white;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .welcome-text h2 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }
        
        .welcome-text p {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .configure-btn {
            background: var(--text-primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
        }
        
        .configure-btn:hover {
            background: var(--primary);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.25);
        }

        /* ===== METRIC CARDS ===== */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .metric-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .metric-card:hover {
            border-color: var(--primary);
            box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.1);
            transform: translateY(-2px);
        }

        .metric-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .metric-icon-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .metric-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -1px;
        }

        /* ===== WIDGET GRID ===== */
        #dashboardWidgets {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 20px;
        }

        .widget-view-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .widget-view-card:hover {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .widget-view-header {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .widget-view-content {
            flex: 1;
            position: relative;
            min-height: 150px;
        }
        
        /* KPI Widget Styles */
        .kpi-card {
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: center;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: 8px;
        }

        .kpi-label {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .kpi-trend {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            width: fit-content;
        }

        .kpi-trend.up {
            background: #D1FAE5;
            color: #059669;
        }

        .kpi-trend.down {
            background: #FEE2E2;
            color: #DC2626;
        }

        /* AI Insight Widget */
        .insight-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .insight-text {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            background: #f9fafb;
            border-radius: 8px;
            font-size: 0.9rem;
            white-space: pre-wrap;
        }
        .insight-refresh-btn {
            margin-top: 8px;
            align-self: flex-end;
        }

        /* backdrop for mobile */
        .sidebar-backdrop {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.5);
            z-index: 15;
            backdrop-filter: blur(4px);
        }

        /* DataTables tweaks */
        .dataTables_wrapper .dataTables_filter input {
            border: 1px solid var(--border-color) !important;
            border-radius: 8px !important;
            padding: 8px 12px !important;
            font-size: 0.85rem !important;
            margin-left: 8px;
        }
        .dataTables_wrapper .dataTables_length select {
            border: 1px solid var(--border-color) !important;
            border-radius: 6px !important;
            padding: 4px 8px !important;
            background: #fff;
        }
        table.dataTable thead th {
            background: #f8fafc !important;
            font-weight: 600 !important;
            font-size: 0.8rem !important;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary) !important;
            border-bottom: 1px solid var(--border-color) !important;
            padding: 12px 16px !important;
        }
        table.dataTable tbody td {
            padding: 12px 16px !important;
            border-bottom: 1px solid #f1f5f9 !important;
            font-size: 0.9rem;
            color: var(--text-primary);
        }
        table.dataTable tbody tr:hover {
            background-color: #f8fafc !important;
        }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 769px) and (max-width: 1024px) {
            .sidebar { width: 80px; }
            .menu-item span { display: none; }
            .menu-item { justify-content: center; padding: 16px 0; }
            .menu-item.active { box-shadow: inset 3px 0 0 var(--primary); }
        }

        @media (max-width: 768px) {
            .navbar { padding: 0 20px; height: 64px; }
            .menu-toggle { display: inline-block; }
            .navbar-center { display: none; }
            .main-container { display: block; }
            .sidebar {
                position: fixed; top: 64px; left: 0; bottom: 0;
                width: 280px; transform: translateX(-100%);
                transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
                z-index: 25;
            }
            .sidebar.open { transform: translateX(0); }
            .content { width: 100%; padding: 24px 20px; }
            .sidebar-backdrop.active { display: block; }
            
            .welcome-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
            
            #dashboardWidgets {
                display: flex;
                flex-direction: column;
            }
            
            .widget-view-card {
                width: 100% !important;
                height: auto !important;
                margin-bottom: 16px;
            }
        }

        @media (max-width: 500px) {
            .user-info .user-name { display: none; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Top Navbar -->
        <header class="navbar">
            <div class="navbar-left">
                <button class="menu-toggle" id="menuToggle" aria-label="Menu">
                    <i class="fas fa-bars"></i>
                </button>
                <!-- Logo + App Name -->
                <div class="app-logo">
                    <div class="logo-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <span class="app-name">Halleyx</span>
                </div>
            </div>

            <div class="navbar-center">
                <label for="dateFilter"><i class="far fa-calendar" style="margin-right:6px; color:var(--primary);"></i> Period</label>
                <select id="dateFilter" class="date-dropdown">
                    <option value="all">All time</option>
                    <option value="today">Today</option>
                    <option value="7d">Last 7 Days</option>
                    <option value="30d">Last 30 Days</option>
                    <option value="90d">Last 90 Days</option>
                </select>
            </div>

            <div class="navbar-right">
                <div class="user-info" id="userInfo">
                    <div class="user-avatar">
                        <i class="fas fa-user" style="font-size: 0.9rem;"></i>
                    </div>
                    <span class="user-name" id="userNameDisplay">Loading...</span>
                </div>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></button>
            </div>
        </header>

        <div class="main-container">
            <aside class="sidebar" id="sidebar">
                <nav class="sidebar-nav">
                    <a href="dashboard.html" class="menu-item active" id="dashboardLink">
                        <i class="fas fa-th-large"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="orders.html" class="menu-item" id="ordersLink">
                        <i class="fas fa-receipt"></i>
                        <span>Customer Orders</span>
                    </a>
                    <a href="configure-dashboard.html" class="menu-item" id="configureLink">
                        <i class="fas fa-sliders-h"></i>
                        <span>Configure</span>
                    </a>
                </nav>
            </aside>

            <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

            <main class="content">
                <div class="welcome-card">
                    <div class="welcome-text">
                        <h2 id="welcomeHeading">Welcome back, <span id="welcomeName">User</span></h2>
                        <p>Here's what's happening with your projects today.</p>
                    </div>
                    <button class="configure-btn" id="configureDashboardBtn">
                        <i class="fas fa-plus"></i> Add Widget
                    </button>
                </div>

                <!-- Redesigned Metrics -->
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-header">
                            <span class="metric-label">Total Customers</span>
                            <div class="metric-icon-box" style="background: rgba(79, 70, 229, 0.1); color: var(--primary);">
                                <i class="fas fa-users"></i>
                            </div>
                        </div>
                        <div class="metric-value" id="totalCustomers">0</div>
                    </div>
                    
                    <div class="metric-card">
                        <div class="metric-header">
                            <span class="metric-label">Revenue (MTD)</span>
                            <div class="metric-icon-box" style="background: rgba(16, 185, 129, 0.1); color: var(--success);">
                                <i class="fas fa-dollar-sign"></i>
                            </div>
                        </div>
                        <div class="metric-value" id="totalRevenue">$0</div>
                    </div>
                    
                    <div class="metric-card">
                        <div class="metric-header">
                            <span class="metric-label">Pending Orders</span>
                            <div class="metric-icon-box" style="background: rgba(245, 158, 11, 0.1); color: var(--warning);">
                                <i class="fas fa-hourglass-half"></i>
                            </div>
                        </div>
                        <div class="metric-value" id="pendingOrders">0</div>
                    </div>
                </div>

                <!-- Widgets Section -->
                <div class="section-header" style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
                    <h3 style="font-size: 1.1rem; font-weight: 700; color: var(--text-primary);">Analytics Overview</h3>
                </div>
                <div id="dashboardWidgets"></div>

            </main>
        </div>
    </div>

    <script>
        (function() {
            // ===== SUPABASE CONFIG =====
            const SUPABASE_URL = 'https://icwvcbzhrxrrknxzmtbk.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imljd3ZjYnpocnhycmtueHptdGJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTM2NzksImV4cCI6MjA4OTA2OTY3OX0.dMOgiB5afMkJvJpwrCI9elyBb5THqbTuqJaq6jLsbPs';

            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // ===== DOM elements =====
            const userNameSpan = document.getElementById('userNameDisplay');
            const welcomeNameSpan = document.getElementById('welcomeName');
            const logoutBtn = document.getElementById('logoutBtn');
            const configureBtn = document.getElementById('configureDashboardBtn');
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            const dateFilter = document.getElementById('dateFilter');
            const totalCustomersEl = document.getElementById('totalCustomers');
            const totalRevenueEl = document.getElementById('totalRevenue');
            const pendingOrdersEl = document.getElementById('pendingOrders');
            const widgetsContainer = document.getElementById('dashboardWidgets');

            // ===== Global state =====
            let currentUser = null;
            let ordersData = [];
            let widgetsList = [];
            const chartInstances = {};
            const tableInstances = {};

            // ===== Helper: hex to rgb =====
            function hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : { r: 79, g: 70, b: 229 };
            }

            // ===== Authentication =====
            async function checkUser() {
                try {
                    const { data: { user }, error } = await supabase.auth.getUser();
                    if (error || !user) {
                        window.location.href = 'index.html';
                        return;
                    }
                    currentUser = user;
                    const name = user.user_metadata?.name || user.email?.split('@')[0] || 'User';
                    userNameSpan.textContent = name;
                    welcomeNameSpan.textContent = name.split(' ')[0] || name;
                } catch (err) {
                    console.error('Session check error:', err);
                    window.location.href = 'index.html';
                }
            }

            // ===== Logout =====
            async function logout() {
                try {
                    const { error } = await supabase.auth.signOut();
                    if (error) throw error;
                    window.location.href = 'index.html';
                } catch (err) {
                    console.error('Logout error:', err);
                    alert('Logout failed: ' + err.message);
                }
            }
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                logout();
            });

            // ===== Fetch orders (filtered by user and date) =====
            async function fetchOrders(dateRange = 'all') {
                if (!currentUser) return [];

                let query = supabase
                    .from('customer_orders')
                    .select('*')
                    .eq('user_id', currentUser.id);

                const now = new Date();
                let startDate = null;
                switch (dateRange) {
                    case 'today': startDate = new Date(now.setHours(0,0,0,0)).toISOString(); break;
                    case '7d': startDate = new Date(now.setDate(now.getDate() - 7)).toISOString(); break;
                    case '30d': startDate = new Date(now.setDate(now.getDate() - 30)).toISOString(); break;
                    case '90d': startDate = new Date(now.setDate(now.getDate() - 90)).toISOString(); break;
                    default: startDate = null;
                }
                if (startDate) query = query.gte('created_at', startDate);

                const { data, error } = await query;
                if (error) {
                    console.error('Error fetching orders:', error);
                    return [];
                }
                ordersData = data || [];
                return ordersData;
            }

            // ===== Load the most recent dashboard config + widgets =====
            async function loadUserConfig() {
                if (!currentUser) return;
                const { data: dashboards, error: dashError } = await supabase
                    .from('dashboard_configs')
                    .select('id')
                    .eq('user_id', currentUser.id)
                    .order('created_at', { ascending: false })
                    .limit(1);
                if (dashError || !dashboards || dashboards.length === 0) {
                    widgetsList = [];
                    return;
                }
                const dashboardId = dashboards[0].id;
                const { data: widgets, error: widgetError } = await supabase
                    .from('dashboard_widgets')
                    .select('*')
                    .eq('dashboard_id', dashboardId);
                if (widgetError) {
                    console.error('Error loading widgets:', widgetError);
                    widgetsList = [];
                } else {
                    widgetsList = widgets || [];
                }
            }

            // ===== Clean up existing charts/tables =====
            function destroyAllWidgets() {
                Object.values(chartInstances).forEach(chart => chart?.destroy());
                Object.values(tableInstances).forEach(table => table?.destroy());
                for (let key in chartInstances) delete chartInstances[key];
                for (let key in tableInstances) delete tableInstances[key];
                widgetsContainer.innerHTML = '';
            }

            // ===== Render all widgets =====
            function renderAllWidgets() {
                destroyAllWidgets();
                if (!widgetsList.length) {
                    widgetsContainer.innerHTML = '<p style="grid-column:span 12; text-align:center; color:var(--text-secondary); padding: 40px;">No widgets configured. Click "Add Widget" to start.</p>';
                    return;
                }
                const sorted = [...widgetsList].sort((a,b) => {
                    if (a.pos_y === b.pos_y) return (a.pos_x || 0) - (b.pos_x || 0);
                    return (a.pos_y || 0) - (b.pos_y || 0);
                });
                sorted.forEach(widget => renderWidget(widget));
            }

            // ===== Render a single widget card =====
            function renderWidget(widget) {
                const card = document.createElement('div');
                card.className = 'widget-view-card';
                card.dataset.widgetId = widget.id;

                const w = widget.width || 4;
                const h = widget.height || 3;
                card.style.gridColumn = `span ${w}`;
                card.style.minHeight = `${h * 80 + 32}px`;

                const settings = widget.settings || {};
                const title = settings.title || widget.widget_type.replace(/_/g,' ').replace(/\b\w/g, l => l.toUpperCase());
                const color = settings.color || '#4F46E5';

                const contentId = `widget-content-${widget.id}`;
                card.innerHTML = `
                    <div class="widget-view-header">
                        <span>${title}</span>
                    </div>
                    <div class="widget-view-content" id="${contentId}"></div>
                `;
                widgetsContainer.appendChild(card);

                renderWidgetContent(widget, contentId, color, settings);
            }

            // ===== Fill widget content =====
            function renderWidgetContent(widget, containerId, color, settings) {
                const container = document.getElementById(containerId);
                if (!container) return;

                const type = widget.widget_type;
                const rgb = hexToRgb(color);
                const chartColor = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 1)`;
                const chartBgColor = `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.1)`;

                // ===== Aggregation helpers =====
                const aggregateData = (data, xField, yField, aggregation) => {
                    const groups = {};
                    data.forEach(item => {
                        let key;
                        if (xField === 'customer') {
                            key = `${item.first_name || ''} ${item.last_name || ''}`.trim() || 'Unknown';
                        } else if (xField === 'month') {
                            const date = new Date(item.created_at);
                            key = date.toLocaleString('default', { month: 'short' });
                        } else {
                            key = item[xField] || 'Unknown';
                        }
                        if (!groups[key]) groups[key] = [];
                        groups[key].push(item);
                    });
                    const labels = Object.keys(groups);
                    let values = labels.map(key => {
                        const group = groups[key];
                        if (aggregation === 'sum') return group.reduce((acc, cur) => acc + (cur[yField] || 0), 0);
                        if (aggregation === 'avg') return group.reduce((acc, cur) => acc + (cur[yField] || 0), 0) / group.length;
                        if (aggregation === 'count') return group.length;
                        if (aggregation === 'max') return Math.max(...group.map(g => g[yField] || 0));
                        if (aggregation === 'min') return Math.min(...group.map(g => g[yField] || 0));
                        return 0;
                    });
                    return { labels, values };
                };

                const getTimeSeriesData = (data, yField, aggregation) => {
                    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                    const groups = {};
                    data.forEach(item => {
                        const date = new Date(item.created_at);
                        const month = months[date.getMonth()];
                        if (!groups[month]) groups[month] = [];
                        groups[month].push(item);
                    });
                    const labels = months.filter(m => groups[m] && groups[m].length > 0);
                    let values = labels.map(month => {
                        const group = groups[month];
                        if (aggregation === 'sum') return group.reduce((acc, cur) => acc + (cur[yField] || 0), 0);
                        if (aggregation === 'avg') return group.reduce((acc, cur) => acc + (cur[yField] || 0), 0) / group.length;
                        if (aggregation === 'count') return group.length;
                        if (aggregation === 'max') return Math.max(...group.map(g => g[yField] || 0));
                        if (aggregation === 'min') return Math.min(...group.map(g => g[yField] || 0));
                        return 0;
                    });
                    return { labels, values };
                };

                // ===== Chart rendering =====
                if (['bar_chart','line_chart','area_chart','scatter_plot','pie_chart'].includes(type)) {
                    const canvas = document.createElement('canvas');
                    container.appendChild(canvas);

                    let chartConfig = null;
                    const xField = settings.xAxis || 'product';
                    const yField = settings.yAxis || 'total_amount';
                    const agg = settings.aggregation || 'sum';

                    if (type === 'bar_chart') {
                        const { labels, values } = aggregateData(ordersData, xField, yField, agg);
                        chartConfig = {
                            type: 'bar',
                            data: { labels, datasets: [{ label: `${agg} of ${yField}`, data: values, backgroundColor: chartBgColor, borderColor: chartColor, borderWidth: 2, borderRadius: 6 }] },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { title: { display: true, text: yField } } } }
                        };
                    } else if (type === 'line_chart') {
                        const { labels, values } = getTimeSeriesData(ordersData, yField, agg);
                        chartConfig = {
                            type: 'line',
                            data: { labels, datasets: [{ label: `${agg} of ${yField}`, data: values, borderColor: chartColor, backgroundColor: chartBgColor, tension: 0.4, fill: false, pointRadius: 4, pointBackgroundColor: chartColor }] },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { title: { display: true, text: yField } } } }
                        };
                    } else if (type === 'area_chart') {
                        const { labels, values } = getTimeSeriesData(ordersData, yField, agg);
                        chartConfig = {
                            type: 'line',
                            data: { labels, datasets: [{ label: `${agg} of ${yField}`, data: values, borderColor: chartColor, backgroundColor: chartBgColor, tension: 0.4, fill: true, pointRadius: 0 }] },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { title: { display: true, text: yField } } } }
                        };
                    } else if (type === 'scatter_plot') {
                        const scatterData = ordersData.map(order => ({ x: order.quantity || 0, y: order.unit_price || 0 }));
                        chartConfig = {
                            type: 'scatter',
                            data: { datasets: [{ label: 'Quantity vs Price', data: scatterData, backgroundColor: chartColor, pointRadius: 6 }] },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { title: { display: true, text: 'Quantity' } }, y: { title: { display: true, text: 'Price ($)' } } } }
                        };
                    } else if (type === 'pie_chart') {
                        const statusGroups = {};
                        ordersData.forEach(order => { const status = order.status || 'Unknown'; statusGroups[status] = (statusGroups[status] || 0) + 1; });
                        chartConfig = {
                            type: 'doughnut',
                            data: { labels: Object.keys(statusGroups), datasets: [{ data: Object.values(statusGroups), backgroundColor: ['#10B981','#F59E0B','#3B82F6','#EF4444','#8B5CF6'], borderWidth: 0 }] },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { size: 11 } } } }, cutout: '60%' }
                        };
                    }

                    if (chartConfig) {
                        chartInstances[widget.id] = new Chart(canvas, chartConfig);
                    }
                }
                else if (type === 'data_table') {
                    const tableId = `table-${widget.id}`;
                    container.innerHTML = `<table id="${tableId}" class="display" style="width:100%"></table>`;
                    const columns = [
                        { title: 'Customer', render: (data, type, row) => `${row.first_name || ''} ${row.last_name || ''}`.trim() || 'N/A' },
                        { title: 'Product', data: 'product' },
                        { title: 'Qty', data: 'quantity' },
                        { title: 'Total', data: 'total_amount', render: (data) => `$${parseFloat(data || 0).toFixed(2)}` },
                        { title: 'Status', data: 'status' }
                    ];
                    const $table = $(`#${tableId}`);
                    tableInstances[widget.id] = $table.DataTable({
                        data: ordersData,
                        columns: columns,
                        pageLength: 5,
                        lengthMenu: [5, 10, 25],
                        order: [[3, 'desc']],
                        language: { search: '', searchPlaceholder: 'Search...' }
                    });
                }
                else if (type.startsWith('kpi_')) {
                    let value = '', trendValue = '+12.5%', trendClass = 'up';
                    if (type === 'kpi_revenue') {
                        const total = ordersData.reduce((sum, o) => sum + (o.total_amount || 0), 0);
                        value = `$${total.toLocaleString()}`;
                    } else if (type === 'kpi_orders') {
                        value = ordersData.length.toLocaleString();
                    } else if (type === 'kpi_average') {
                        const total = ordersData.reduce((sum, o) => sum + (o.total_amount || 0), 0);
                        const avg = ordersData.length ? total / ordersData.length : 0;
                        value = `$${avg.toFixed(2)}`;
                    } else if (type === 'kpi_pending') {
                        const pending = ordersData.filter(o => o.status === 'Pending').length;
                        value = pending.toLocaleString();
                        trendValue = '-5.1%';
                        trendClass = 'down';
                    }
                    const label = settings.title || type.replace('kpi_','').replace(/_/g,' ').replace(/\b\w/g, l => l.toUpperCase());
                    const trendIcon = trendClass === 'up' 
                        ? '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>'
                        : '<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>';
                    container.innerHTML = `
                        <div class="kpi-card">
                            <div class="kpi-value" style="color: ${color}">${value}</div>
                            <div class="kpi-label">${label}</div>
                            <div class="kpi-trend ${trendClass}">
                                ${trendIcon}
                                ${trendValue} this month
                            </div>
                        </div>
                    `;
                }
                else if (type === 'ai_insight') {
                    container.innerHTML = `
                        <div class="insight-container">
                            <div id="insight-text-${widget.id}" class="insight-text">
                                Click refresh to get AI insights...
                            </div>
                            <button onclick="window.refreshInsight('${widget.id}')" class="btn btn-secondary btn-sm insight-refresh-btn">
                                <i class="fas fa-sync-alt"></i> Refresh
                            </button>
                        </div>
                    `;
                    // Automatically fetch insight after a short delay
                    setTimeout(() => window.refreshInsight(widget.id), 500);
                }
            }

            // ===== AI Insight fetch function (global) =====
            window.refreshInsight = async function(widgetId) {
                const container = document.getElementById(`insight-text-${widgetId}`);
                if (!container) return;
                container.innerHTML = '⏳ Generating insights...';

                try {
                    const summary = {
                        totalOrders: ordersData.length,
                        totalRevenue: ordersData.reduce((sum, o) => sum + (o.total_amount || 0), 0),
                        productCounts: ordersData.reduce((acc, o) => { acc[o.product] = (acc[o.product] || 0) + 1; return acc; }, {}),
                        statusBreakdown: ordersData.reduce((acc, o) => { acc[o.status] = (acc[o.status] || 0) + 1; return acc; }, {}),
                        dateRange: dateFilter.value
                    };

                    const { data: { session } } = await supabase.auth.getSession();
                    const response = await fetch('https://icwvcbzhrxrrknxzmtbk.supabase.co/functions/v1/ai-insight', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${session?.access_token}`
                        },
                        body: JSON.stringify({ summary })
                    });

                    if (!response.ok) throw new Error('Failed to fetch insight');
                    const data = await response.json();
                    container.innerHTML = data.insight || 'No insights available.';
                } catch (err) {
                    container.innerHTML = '❌ Failed to load insights.';
                    console.error(err);
                }
            };

            // ===== Update metric cards =====
            function updateMetricCards() {
                totalCustomersEl.textContent = ordersData.length;
                const totalRevenue = ordersData.reduce((sum, order) => sum + (parseFloat(order.total_amount) || 0), 0);
                totalRevenueEl.textContent = totalRevenue >= 1000 ? `$${(totalRevenue / 1000).toFixed(1)}k` : `$${totalRevenue.toFixed(2)}`;
                pendingOrdersEl.textContent = ordersData.filter(order => order.status === 'Pending').length;
            }

            // ===== Refresh all data =====
            async function refreshDashboard(dateRange) {
                await fetchOrders(dateRange);
                updateMetricCards();
                renderAllWidgets();
            }

            dateFilter.addEventListener('change', (e) => refreshDashboard(e.target.value));

            // ===== Sidebar mobile toggle =====
            function openSidebar() { sidebar.classList.add('open'); backdrop.classList.add('active'); document.body.style.overflow = 'hidden'; }
            function closeSidebar() { sidebar.classList.remove('open'); backdrop.classList.remove('active'); document.body.style.overflow = ''; }
            menuToggle.addEventListener('click', (e) => { e.stopPropagation(); sidebar.classList.contains('open') ? closeSidebar() : openSidebar(); });
            backdrop.addEventListener('click', closeSidebar);
            window.addEventListener('resize', () => { if (window.innerWidth > 768) closeSidebar(); });

            configureBtn.addEventListener('click', () => { window.location.href = 'configure-dashboard.html'; });

            // ===== Real‑time subscription =====
            function setupRealtimeSubscription() {
                if (!currentUser) return;
                const subscription = supabase
                    .channel('orders-changes')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'customer_orders', filter: `user_id=eq.${currentUser.id}` },
                        (payload) => { console.log('Realtime change detected:', payload); refreshDashboard(dateFilter.value); })
                    .subscribe();
                window.realtimeSubscription = subscription;
            }

            // ===== INIT =====
            (async function init() {
                await checkUser();
                if (!currentUser) return;
                await fetchOrders('all');
                updateMetricCards();
                await loadUserConfig();
                renderAllWidgets();
                setupRealtimeSubscription();
            })();
        })();
    </script>
</body>
</html>
