<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halleyx · Customer Orders</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Export libraries (same as configure-dashboard) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    
    <style>
        /* === GLOBAL VARIABLES & RESET === */
        :root {
            --primary: #4F46E5;
            --primary-light: #818cf8;
            --primary-dark: #3730a3;
            --sidebar-bg: #0f172a;
            --sidebar-hover: #1e293b;
            --body-bg: #f1f5f9;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --border-color: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--body-bg);
            height: 100vh;
            overflow: hidden;
            color: var(--text-primary);
            font-feature-settings: "cv02", "cv03", "cv04", "cv11";
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            flex-shrink: 0;
            height: 72px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            border-bottom: 1px solid var(--border-color);
            z-index: 30;
        }

        .navbar-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-toggle {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: var(--text-secondary);
            cursor: pointer;
            display: none;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .menu-toggle:hover {
            background: var(--body-bg);
            color: var(--primary);
        }

        /* Logo icon – matches login/dashboard */
        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            box-shadow: 0 8px 16px -4px rgba(79, 70, 229, 0.4);
        }

        /* Override margin for navbar context */
        .navbar-left .logo-icon {
            margin-bottom: 0;
        }

        .app-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-name {
            font-weight: 800;
            font-size: 1.35rem;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .navbar-center {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--body-bg);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        
        .navbar-center:focus-within {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .navbar-center label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .date-dropdown {
            border: none;
            background: transparent;
            font-weight: 600;
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px 6px 6px;
            border-radius: 12px;
            transition: background 0.2s;
            cursor: pointer;
        }
        
        .user-info:hover {
            background: var(--body-bg);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .logout-btn {
            background: white;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .logout-btn:hover {
            background: #fef2f2;
            border-color: #fecaca;
            color: var(--danger);
        }

        /* ===== MAIN CONTAINER ===== */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            color: #FFFFFF;
            display: flex;
            flex-direction: column;
            transition: width 0.25s ease;
            overflow-y: auto;
            overflow-x: hidden;
            border-right: 1px solid rgba(255,255,255,0.05);
            z-index: 20;
        }

        .sidebar-nav {
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            color: var(--text-tertiary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.15s;
            white-space: nowrap;
            position: relative;
        }
        
        .menu-item i {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
            transition: transform 0.2s;
        }
        
        .menu-item span { 
            font-size: 0.95rem; 
            letter-spacing: -0.2px;
        }
        
        .menu-item:hover { 
            background: var(--sidebar-hover); 
            color: #ffffff; 
        }
        
        .menu-item:hover i { 
            transform: scale(1.1); 
            color: var(--primary-light); 
        }
        
        .menu-item.active {
            background: linear-gradient(90deg, rgba(79, 70, 229, 0.2) 0%, rgba(79, 70, 229, 0.05) 100%);
            color: white;
            box-shadow: inset 3px 0 0 var(--primary);
        }
        
        .menu-item.active i { 
            color: var(--primary-light); 
        }

        /* ===== MAIN CONTENT ===== */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 32px 40px;
            background-color: var(--body-bg);
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .page-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
        }

        .btn-primary i { font-size: 0.9rem; }
        
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.35);
        }

        /* Export dropdown button */
        .btn-secondary {
            background: white;
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }
        .btn-secondary:hover {
            background: #f8fafc;
            color: var(--text-primary);
        }

        .export-dropdown {
            position: relative;
            display: inline-block;
        }
        .export-dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 4px;
            background: white;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            z-index: 50;
            min-width: 160px;
        }
        .export-dropdown-content button {
            width: 100%;
            text-align: left;
            padding: 10px 16px;
            border: none;
            background: none;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            transition: background 0.1s;
        }
        .export-dropdown-content button:hover {
            background: var(--body-bg);
        }
        .export-dropdown-content button i {
            width: 18px;
            color: var(--primary);
        }
        .export-dropdown.active .export-dropdown-content {
            display: block;
        }

        /* Loading spinner */
        .spinner-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== ORDERS CARD & TABLE ===== */
        .orders-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px; /* Ensures scroll on mobile */
        }

        th {
            text-align: left;
            padding: 14px 16px;
            background-color: #f8fafc;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        tr:last-child td { border-bottom: none; }
        
        tr:hover td {
            background-color: #f8fafc;
        }

        /* Status Badges */
        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
            text-align: center;
            letter-spacing: 0.3px;
        }
        .badge.pending {
            background: rgba(245, 158, 11, 0.1);
            color: #D97706;
        }
        .badge.in-progress {
            background: rgba(59, 130, 246, 0.1);
            color: #2563EB;
        }
        .badge.completed {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .action-btn {
            background: white;
            border: 1px solid var(--border-color);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            cursor: pointer;
            transition: all 0.15s;
        }
        
        .action-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #f5f3ff;
        }
        
        .action-btn.delete:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: #fff5f5;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            animation: slideUp 0.3s ease-out;
        }
        
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-tertiary);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .close-modal:hover {
            background: var(--body-bg);
            color: var(--text-primary);
        }

        /* Form Styling */
        .form-section {
            margin-bottom: 32px;
        }
        .form-section h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 16px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }
        .form-group input, .form-group select {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9rem;
            background: #f8fafc;
            transition: 0.15s;
            outline: none;
            color: var(--text-primary);
        }
        .form-group input:focus, .form-group select:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
        }
        .form-group .error-message {
            color: var(--danger);
            font-size: 0.75rem;
            min-height: 16px;
            font-weight: 500;
        }
        .readonly-field {
            background: #f1f5f9 !important;
            color: var(--text-secondary);
            font-weight: 600;
            border-color: transparent !important;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        .btn-secondary {
            background: white;
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background: #f8fafc;
            color: var(--text-primary);
        }
        .btn-submit {
            background: var(--primary);
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
        }
        .btn-submit:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        /* backdrop for mobile */
        .sidebar-backdrop {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.5);
            z-index: 15;
            backdrop-filter: blur(4px);
        }

        /* ===== RESPONSIVE ===== */
        @media (min-width: 769px) and (max-width: 1024px) {
            .sidebar { width: 80px; }
            .menu-item span { display: none; }
            .menu-item { justify-content: center; padding: 16px 0; }
            .menu-item.active { box-shadow: inset 3px 0 0 var(--primary); }
        }

        @media (max-width: 768px) {
            .navbar { padding: 0 20px; height: 64px; }
            .menu-toggle { display: inline-block; }
            .navbar-center { display: none; }
            .main-container { display: block; }
            .sidebar {
                position: fixed; top: 64px; left: 0; bottom: 0;
                width: 280px; transform: translateX(-100%);
                transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
                z-index: 25;
            }
            .sidebar.open { transform: translateX(0); }
            .content { width: 100%; padding: 24px 20px; }
            .sidebar-backdrop.active { display: block; }
            
            /* Mobile Table Layout */
            .table-responsive {
                border: none;
            }
            table, thead, tbody, th, td, tr {
                display: block;
            }
            thead {
                display: none;
            }
            tr {
                margin-bottom: 16px;
                background: white;
                border-radius: 12px;
                padding: 16px;
                border: 1px solid var(--border-color);
            }
            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px 0;
                border-bottom: 1px solid #f1f5f9;
            }
            td:last-child { border-bottom: none; margin-top: 8px; padding-top: 16px; border-top: 1px solid var(--border-color); }
            
            td:before {
                content: attr(data-label);
                font-weight: 600;
                color: var(--text-secondary);
                font-size: 0.8rem;
                text-transform: uppercase;
            }
            
            .action-buttons {
                width: 100%;
                justify-content: flex-end;
            }
            
            .modal-content { padding: 24px; border-radius: 20px; }
            .form-row { grid-template-columns: 1fr; gap: 16px; }
            
            .page-header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-actions {
                justify-content: space-between;
            }
        }

        @media (max-width: 500px) {
            .user-info .user-name { display: none; }
            .logout-btn span { display: none; }
            .logout-btn { padding: 8px 12px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Navbar -->
        <header class="navbar">
            <div class="navbar-left">
                <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                <!-- Logo + App Name -->
                <div class="app-logo">
                    <div class="logo-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <span class="app-name">Halleyx</span>
                </div>
            </div>
            <div class="navbar-center">
                <label for="dateFilter"><i class="far fa-calendar" style="color:var(--primary); margin-right: 6px;"></i> Period</label>
                <select id="dateFilter" class="date-dropdown">
                    <option value="all">All time</option>
                    <option value="today">Today</option>
                    <option value="7d">Last 7 Days</option>
                    <option value="30d">Last 30 Days</option>
                    <option value="90d">Last 90 Days</option>
                </select>
            </div>
            <div class="navbar-right">
                <div class="user-info" id="userInfo">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <span class="user-name" id="userNameDisplay">Loading...</span>
                </div>
                <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></button>
            </div>
        </header>

        <div class="main-container">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <nav class="sidebar-nav">
                    <a href="dashboard.html" class="menu-item"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
                    <a href="orders.html" class="menu-item active"><i class="fas fa-receipt"></i><span>Customer Orders</span></a>
                    <a href="configure-dashboard.html" class="menu-item"><i class="fas fa-sliders-h"></i><span>Configure</span></a>
                </nav>
            </aside>
            <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

            <!-- Main Content -->
            <main class="content">
                <div class="page-header">
                    <h1>Customer Orders</h1>
                    <div class="header-actions">
                        <!-- Export Dropdown -->
                        <div class="export-dropdown" id="exportDropdown">
                            <button class="btn-secondary" id="exportDropdownBtn">
                                <i class="fas fa-download"></i> Export
                            </button>
                            <div class="export-dropdown-content">
                                <button id="exportPdfBtn"><i class="fas fa-file-pdf"></i> PDF Report</button>
                                <button id="exportExcelBtn"><i class="fas fa-file-excel"></i> Excel Data</button>
                            </div>
                        </div>
                        <button class="btn-primary" id="createOrderBtn"><i class="fas fa-plus"></i> Create Order</button>
                    </div>
                </div>

                <div class="orders-card">
                    <div class="table-responsive" id="ordersTableContainer">
                        <!-- Loading spinner will be shown here while loading -->
                        <div id="loadingSpinner" class="spinner-container" style="display: none;">
                            <div class="spinner"></div>
                        </div>
                        <table id="ordersTable" style="display: none;">
                            <thead>
                                <tr>
                                    <th>Customer</th><th>Email</th><th>Product</th><th>Qty</th><th>Total</th><th>Status</th><th>Created By</th><th style="text-align:right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="ordersTableBody"></tbody>
                        </table>
                        <div id="noOrdersMessage" style="display: none; text-align:center; padding: 40px; color: var(--text-tertiary); font-weight: 500;">No orders found for this period.</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Create Customer Order</h2>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>

            <form id="orderForm">
                <div class="form-section">
                    <h3>Customer Information</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name *</label>
                            <input type="text" id="firstName" required>
                            <div class="error-message" id="error-firstName"></div>
                        </div>
                        <div class="form-group">
                            <label>Last Name *</label>
                            <input type="text" id="lastName" required>
                            <div class="error-message" id="error-lastName"></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="email" required>
                            <div class="error-message" id="error-email"></div>
                        </div>
                        <div class="form-group">
                            <label>Phone Number *</label>
                            <input type="tel" id="phone" required>
                            <div class="error-message" id="error-phone"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Street Address *</label>
                        <input type="text" id="streetAddress" required>
                        <div class="error-message" id="error-streetAddress"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>City *</label>
                            <input type="text" id="city" required>
                            <div class="error-message" id="error-city"></div>
                        </div>
                        <div class="form-group">
                            <label>State / Province *</label>
                            <input type="text" id="state" required>
                            <div class="error-message" id="error-state"></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Postal Code *</label>
                            <input type="text" id="postalCode" required>
                            <div class="error-message" id="error-postalCode"></div>
                        </div>
                        <div class="form-group">
                            <label>Country *</label>
                            <select id="country" required>
                                <option value="">-- Select --</option>
                                <option value="United States">United States</option>
                                <option value="Canada">Canada</option>
                                <option value="Australia">Australia</option>
                                <option value="Singapore">Singapore</option>
                                <option value="Hong Kong">Hong Kong</option>
                                <option value="India">India</option>
                            </select>
                            <div class="error-message" id="error-country"></div>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Order Information</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Product *</label>
                            <select id="product" required>
                                <option value="">-- Select --</option>
                                <option value="Fiber Internet 300 Mbps">Fiber Internet 300 Mbps</option>
                                <option value="5G Unlimited Mobile Plan">5G Unlimited Mobile Plan</option>
                                <option value="Fiber Internet 1 Gbps">Fiber Internet 1 Gbps</option>
                                <option value="Business Internet 500 Mbps">Business Internet 500 Mbps</option>
                                <option value="VoIP Corporate Package">VoIP Corporate Package</option>
                            </select>
                            <div class="error-message" id="error-product"></div>
                        </div>
                        <div class="form-group">
                            <label>Quantity *</label>
                            <input type="number" id="quantity" min="1" value="1" required>
                            <div class="error-message" id="error-quantity"></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Unit Price ($) *</label>
                            <input type="number" id="unitPrice" step="0.01" min="0" value="0.00" required>
                            <div class="error-message" id="error-unitPrice"></div>
                        </div>
                        <div class="form-group">
                            <label>Total Amount ($)</label>
                            <input type="text" id="totalAmount" class="readonly-field" readonly>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Status *</label>
                            <select id="status" required>
                                <option value="Pending">Pending</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Created By *</label>
                            <select id="createdBy" required>
                                <option value="">-- Select --</option>
                                <option value="Mr. Michael Harris">Mr. Michael Harris</option>
                                <option value="Mr. Ryan Cooper">Mr. Ryan Cooper</option>
                                <option value="Ms. Olivia Carter">Ms. Olivia Carter</option>
                                <option value="Mr. Lucas Martin">Mr. Lucas Martin</option>
                            </select>
                            <div class="error-message" id="error-createdBy"></div>
                        </div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelModalBtn">Cancel</button>
                    <button type="submit" class="btn-submit" id="submitOrderBtn">Save Order</button>
                </div>
                <input type="hidden" id="orderId" value="">
            </form>
        </div>
    </div>

    <script>
        (function() {
            // === Supabase setup ===
            const SUPABASE_URL = 'https://icwvcbzhrxrrknxzmtbk.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imljd3ZjYnpocnhycmtueHptdGJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0OTM2NzksImV4cCI6MjA4OTA2OTY3OX0.dMOgiB5afMkJvJpwrCI9elyBb5THqbTuqJaq6jLsbPs';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // DOM elements
            const userNameSpan = document.getElementById('userNameDisplay');
            const userAvatar = document.getElementById('userAvatar');
            const logoutBtn = document.getElementById('logoutBtn');
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const backdrop = document.getElementById('sidebarBackdrop');
            const createOrderBtn = document.getElementById('createOrderBtn');
            const modal = document.getElementById('orderModal');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const cancelModalBtn = document.getElementById('cancelModalBtn');
            const orderForm = document.getElementById('orderForm');
            const modalTitle = document.getElementById('modalTitle');
            const orderIdHidden = document.getElementById('orderId');
            const tableBody = document.getElementById('ordersTableBody');
            const dateFilter = document.getElementById('dateFilter');
            const ordersTable = document.getElementById('ordersTable');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const noOrdersMessage = document.getElementById('noOrdersMessage');

            // Export elements
            const exportDropdown = document.getElementById('exportDropdown');
            const exportDropdownBtn = document.getElementById('exportDropdownBtn');
            const exportPdfBtn = document.getElementById('exportPdfBtn');
            const exportExcelBtn = document.getElementById('exportExcelBtn');

            // Store current filtered orders for export
            let currentOrders = [];

            // Total calculation
            const quantityInput = document.getElementById('quantity');
            const unitPriceInput = document.getElementById('unitPrice');
            const totalAmountInput = document.getElementById('totalAmount');

            function calculateTotal() {
                const qty = parseInt(quantityInput.value) || 0;
                const price = parseFloat(unitPriceInput.value) || 0;
                totalAmountInput.value = (qty * price).toFixed(2);
            }
            quantityInput.addEventListener('input', calculateTotal);
            unitPriceInput.addEventListener('input', calculateTotal);

            // === Authentication check + load user name ===
            async function checkAuth() {
                const { data: { user }, error } = await supabase.auth.getUser();
                if (error || !user) {
                    window.location.href = 'index.html';
                    return;
                }
                const name = user.user_metadata?.name || user.email?.split('@')[0] || 'User';
                const initials = name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
                
                userNameSpan.textContent = name;
                userAvatar.textContent = initials;
            }
            checkAuth();

            // === Logout ===
            logoutBtn.addEventListener('click', async () => {
                await supabase.auth.signOut();
                window.location.href = 'index.html';
            });

            // === Mobile menu ===
            function openSidebar() {
                sidebar.classList.add('open');
                backdrop.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
            function closeSidebar() {
                sidebar.classList.remove('open');
                backdrop.classList.remove('active');
                document.body.style.overflow = '';
            }
            menuToggle.addEventListener('click', () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
            backdrop.addEventListener('click', closeSidebar);

            // === Show/hide loading spinner ===
            function setLoading(isLoading) {
                if (isLoading) {
                    loadingSpinner.style.display = 'flex';
                    ordersTable.style.display = 'none';
                    noOrdersMessage.style.display = 'none';
                } else {
                    loadingSpinner.style.display = 'none';
                }
            }

            // === CRUD: Load orders (filtered by user_id and date) ===
            async function loadOrders(filterValue = 'all') {
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) return;

                setLoading(true);

                let query = supabase
                    .from('customer_orders')
                    .select('*')
                    .eq('user_id', user.id);

                // Date Filtering Logic
                const now = new Date();
                let startDate = null;

                switch (filterValue) {
                    case 'today':
                        startDate = new Date(now.setHours(0, 0, 0, 0)).toISOString();
                        break;
                    case '7d':
                        const sevenDaysAgo = new Date();
                        sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
                        startDate = sevenDaysAgo.toISOString();
                        break;
                    case '30d':
                        const thirtyDaysAgo = new Date();
                        thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
                        startDate = thirtyDaysAgo.toISOString();
                        break;
                    case '90d':
                        const ninetyDaysAgo = new Date();
                        ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);
                        startDate = ninetyDaysAgo.toISOString();
                        break;
                    default:
                        startDate = null;
                }

                if (startDate) {
                    query = query.gte('created_at', startDate);
                }

                const { data, error } = await query.order('created_at', { ascending: false });

                setLoading(false);

                if (error) {
                    console.error('Error loading orders:', error);
                    tableBody.innerHTML = ''; // clear
                    ordersTable.style.display = 'none';
                    noOrdersMessage.style.display = 'block';
                    noOrdersMessage.textContent = 'Failed to load orders.';
                    return;
                }

                currentOrders = data || []; // store for export

                if (!data || data.length === 0) {
                    ordersTable.style.display = 'none';
                    noOrdersMessage.style.display = 'block';
                    noOrdersMessage.textContent = 'No orders found for this period.';
                    return;
                }

                ordersTable.style.display = 'table';
                noOrdersMessage.style.display = 'none';

                let html = '';
                data.forEach(order => {
                    const fullName = `${order.first_name || ''} ${order.last_name || ''}`.trim();
                    const statusClass = (order.status || '').toLowerCase().replace(' ', '-');
                    html += `<tr>
                        <td data-label="Customer Name"><div style="font-weight: 600; color: var(--text-primary);">${fullName}</div></td>
                        <td data-label="Email"><div style="color: var(--text-secondary);">${order.email || ''}</div></td>
                        <td data-label="Product"><div style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${order.product || ''}">${order.product || ''}</div></td>
                        <td data-label="Qty">${order.quantity || 0}</td>
                        <td data-label="Total" style="font-weight: 600; color: var(--text-primary);">$${parseFloat(order.total_amount || 0).toFixed(2)}</td>
                        <td data-label="Status"><span class="badge ${statusClass}">${order.status || ''}</span></td>
                        <td data-label="Created By">${order.created_by || ''}</td>
                        <td data-label="Actions">
                            <div class="action-buttons">
                                <button class="action-btn edit" data-id="${order.id}" title="Edit"><i class="fas fa-pen"></i></button>
                                <button class="action-btn delete" data-id="${order.id}" title="Delete"><i class="fas fa-trash"></i></button>
                            </div>
                        </td>
                    </tr>`;
                });
                tableBody.innerHTML = html;

                // Attach edit/delete listeners
                document.querySelectorAll('.action-btn.edit').forEach(btn => {
                    btn.addEventListener('click', (e) => openEditModal(e.target.closest('button').dataset.id));
                });
                document.querySelectorAll('.action-btn.delete').forEach(btn => {
                    btn.addEventListener('click', (e) => deleteOrder(e.target.closest('button').dataset.id));
                });
            }

            // Initial load
            loadOrders('all');

            // Date filter change
            dateFilter.addEventListener('change', (e) => {
                loadOrders(e.target.value);
            });

            // === Modal open/close ===
            function openModal(editMode = false) {
                modal.classList.add('active');
                if (!editMode) {
                    orderForm.reset();
                    orderIdHidden.value = '';
                    modalTitle.textContent = 'Create Customer Order';
                    calculateTotal();
                }
            }
            function closeModal() {
                modal.classList.remove('active');
                clearErrors();
            }
            function clearErrors() {
                document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
            }

            createOrderBtn.addEventListener('click', () => openModal(false));
            closeModalBtn.addEventListener('click', closeModal);
            cancelModalBtn.addEventListener('click', closeModal);
            window.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });

            // === Create / Edit order submit ===
            orderForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                clearErrors();

                // basic validation
                const requiredFields = [
                    'firstName', 'lastName', 'email', 'phone', 'streetAddress', 'city', 'state', 'postalCode', 'country',
                    'product', 'quantity', 'unitPrice', 'status', 'createdBy'
                ];
                let hasError = false;
                requiredFields.forEach(id => {
                    const field = document.getElementById(id);
                    if (!field.value.trim()) {
                        document.getElementById(`error-${id}`).textContent = 'Required';
                        hasError = true;
                    }
                });
                if (parseInt(quantityInput.value) < 1) {
                    document.getElementById('error-quantity').textContent = 'Invalid quantity';
                    hasError = true;
                }
                if (hasError) return;

                // Get current user
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) {
                    alert('You must be logged in');
                    return;
                }

                const formData = {
                    first_name: document.getElementById('firstName').value.trim(),
                    last_name: document.getElementById('lastName').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    street_address: document.getElementById('streetAddress').value.trim(),
                    city: document.getElementById('city').value.trim(),
                    state: document.getElementById('state').value.trim(),
                    postal_code: document.getElementById('postalCode').value.trim(),
                    country: document.getElementById('country').value,
                    product: document.getElementById('product').value,
                    quantity: parseInt(quantityInput.value),
                    unit_price: parseFloat(unitPriceInput.value),
                    total_amount: parseFloat(totalAmountInput.value),
                    status: document.getElementById('status').value,
                    created_by: document.getElementById('createdBy').value
                };

                const orderId = orderIdHidden.value;
                let error;

                if (orderId) {
                    ({ error } = await supabase
                        .from('customer_orders')
                        .update(formData)
                        .eq('id', orderId));
                } else {
                    formData.user_id = user.id;
                    ({ error } = await supabase
                        .from('customer_orders')
                        .insert([formData]));
                }

                if (error) {
                    alert('Error saving order: ' + error.message);
                } else {
                    closeModal();
                    loadOrders(dateFilter.value);
                }
            });

            // === Edit order: populate modal ===
            async function openEditModal(id) {
                const { data, error } = await supabase
                    .from('customer_orders')
                    .select('*')
                    .eq('id', id)
                    .single();
                if (error || !data) {
                    alert('Order not found');
                    return;
                }
                // populate form
                document.getElementById('firstName').value = data.first_name || '';
                document.getElementById('lastName').value = data.last_name || '';
                document.getElementById('email').value = data.email || '';
                document.getElementById('phone').value = data.phone || '';
                document.getElementById('streetAddress').value = data.street_address || '';
                document.getElementById('city').value = data.city || '';
                document.getElementById('state').value = data.state || '';
                document.getElementById('postalCode').value = data.postal_code || '';
                document.getElementById('country').value = data.country || '';
                document.getElementById('product').value = data.product || '';
                document.getElementById('quantity').value = data.quantity || 1;
                document.getElementById('unitPrice').value = data.unit_price || 0;
                document.getElementById('status').value = data.status || 'Pending';
                document.getElementById('createdBy').value = data.created_by || '';
                orderIdHidden.value = data.id;
                calculateTotal();
                modalTitle.textContent = 'Edit Customer Order';
                openModal(true);
            }

            // === Delete order ===
            async function deleteOrder(id) {
                if (!confirm('Are you sure you want to delete this order?')) return;
                const { error } = await supabase
                    .from('customer_orders')
                    .delete()
                    .eq('id', id);
                if (error) {
                    alert('Delete failed: ' + error.message);
                } else {
                    loadOrders(dateFilter.value);
                }
            }

            // ========== EXPORT FUNCTIONS ==========
            function showToast(msg, type = 'info') {
                // Simple alert fallback; you could integrate a toast like in configure-dashboard
                alert(msg);
            }

            // PDF Export: capture the orders table
            window.exportOrdersAsPDF = function() {
                const element = document.getElementById('ordersTable');
                if (!element || element.style.display === 'none') {
                    showToast('No data to export', 'error');
                    return;
                }

                showToast('Generating PDF...', 'info');
                html2canvas(element, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    logging: false,
                    allowTaint: false,
                    useCORS: true
                }).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    const pdf = new jspdf.jsPDF({
                        orientation: 'landscape',
                        unit: 'px',
                        format: [canvas.width * 0.75, canvas.height * 0.75]
                    });
                    pdf.addImage(imgData, 'PNG', 0, 0, canvas.width * 0.75, canvas.height * 0.75);
                    pdf.save('orders-report.pdf');
                    showToast('PDF downloaded', 'success');
                }).catch(error => {
                    console.error('PDF error:', error);
                    showToast('Failed to generate PDF', 'error');
                });
            };

            // Excel Export: export currentOrders
            window.exportOrdersAsExcel = function() {
                if (!currentOrders || currentOrders.length === 0) {
                    showToast('No data to export', 'error');
                    return;
                }

                try {
                    // Prepare data: remove internal fields if desired (e.g., user_id, id)
                    const exportData = currentOrders.map(({ id, user_id, created_at, ...rest }) => rest);
                    const worksheet = XLSX.utils.json_to_sheet(exportData);
                    const workbook = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(workbook, worksheet, 'Orders');
                    XLSX.writeFile(workbook, 'orders-data.xlsx');
                    showToast('Excel downloaded', 'success');
                } catch (error) {
                    console.error('Excel error:', error);
                    showToast('Failed to generate Excel', 'error');
                }
            };

            // Dropdown toggle
            exportDropdownBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                exportDropdown.classList.toggle('active');
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!exportDropdown.contains(e.target)) {
                    exportDropdown.classList.remove('active');
                }
            });

            // Attach export handlers
            exportPdfBtn.addEventListener('click', () => {
                exportDropdown.classList.remove('active');
                window.exportOrdersAsPDF();
            });
            exportExcelBtn.addEventListener('click', () => {
                exportDropdown.classList.remove('active');
                window.exportOrdersAsExcel();
            });
        })();
    </script>
</body>
</html>
